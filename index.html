<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PSA仕入れ検索</title>
  <meta name="theme-color" content="#f4f6f8" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="hero-copy">
        <div class="eyebrow">店頭チェック用</div>
        <h1>PSA仕入れ検索</h1>
        <p class="lead">店で素早く判断できるように、仕入れ可否・価格・流動性を大きく見せます。</p>
      </div>
      <div class="stats" id="stats" aria-label="集計"></div>
    </header>

    <section class="controls" aria-label="検索条件">
      <input id="search" type="search" placeholder="カード名・収録パックで検索" />
      <select id="evalFilter" aria-label="総合評価">
        <option value="">総合評価 すべて</option>
        <option value="買い">買い</option>
        <option value="条件付き">条件付き</option>
        <option value="見送り">見送り</option>
      </select>
      <select id="judgeFilter" aria-label="13k判断">
        <option value="">13k判断 すべて</option>
        <option value="縦積み可">縦積み可</option>
        <option value="少数なら買い">少数なら買い</option>
        <option value="安ければ少数">安ければ少数</option>
        <option value="かなり安ければ">かなり安ければ</option>
        <option value="見送り">見送り</option>
      </select>
      <select id="packFilter" aria-label="収録パック">
        <option value="">収録パック すべて</option>
      </select>
      <label class="toggle">
        <input id="onlyCircle" type="checkbox" />
        <span>〇のみ</span>
      </label>
    </section>

    <section class="quick" aria-label="クイック検索">
      <button data-term="ピカチュウ">ピカチュウ</button>
      <button data-term="リザードン">リザードン</button>
      <button data-term="ミュウ">ミュウ</button>
      <button data-term="メガ">メガ</button>
      <button data-term="ブラッキー">ブラッキー</button>
    </section>

    <section class="results">
      <div class="results-head">
        <div class="result-count" id="resultCount"></div>
        <div class="hint">仕入れ候補は上から順に見ればOK。店頭では「仕入れ可」の色と価格だけ先に見てください。</div>
      </div>
      <div id="list" class="list"></div>
    </section>
  </main>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
